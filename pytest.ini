[pytest]
DJANGO_SETTINGS_MODULE = AITestProduct.settings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --cov=testcase.repositories.testcase_repository --cov=testcase.repositories.module_repository --cov=testcase.services.testcase_service --cov=project.repositories.project_repository --cov=project.services.project_service --cov=defect.repositories.defect_repository --cov=defect.services.defect_service --cov=assistant.repositories.knowledge_article_repository --cov=assistant.repositories.knowledge_document_repository --cov=assistant.repositories.generated_test_artifact_repository --cov=assistant.services.knowledge_article_service --cov=assistant.services.knowledge_document_service --cov=assistant.services.generated_test_artifact_service --cov=user.repositories.user_repository --cov=user.repositories.organization_repository --cov=user.services.user_service --cov=user.services.organization_service --cov=execution.repositories.test_plan_repository --cov=execution.repositories.test_report_repository --cov=execution.services.test_plan_service --cov=execution.services.test_report_service --cov=common.repositories.base_repository --cov=common.services.base_service --cov-report=html --cov-report=term --cov-fail-under=70
markers =
    smoke: 核心冒烟用例（关键链路）
    regression: 回归用例（覆盖主要业务流程）
    full: 全量用例（完整接口矩阵）
