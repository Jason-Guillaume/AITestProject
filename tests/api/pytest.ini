# pytest 配置文件

[pytest]
# 测试标记
markers =
    slow: 标记为慢速测试
    smoke: 冒烟测试
    regression: 回归测试
    full: 全量测试

# 测试收集配置
testpaths = tests/api
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts = -v --tb=short --color=yes

# 超时配置 (需要 pytest-timeout)
timeout = 60

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置 (需要 pytest-cov)
# cov = .
# cov_report = html:htmlcov
# cov_report = term-missing

# 打印测试摘要
console_output_style = progress

# 跳过标记
# addopts = -m "not slow"
